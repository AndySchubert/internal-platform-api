<div class="container">
  <h1>Create Project</h1>

  <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="project-form">
    <div class="form-group">
      <label for="name">Project Name *</label>
      <input type="text" id="name" formControlName="name" class="form-control"
        [class.error]="projectForm.get('name')?.invalid && projectForm.get('name')?.touched" placeholder="my-project" />
      <div *ngIf="projectForm.get('name')?.invalid && projectForm.get('name')?.touched" class="error-message">
        Project name is required
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" class="form-control" rows="4"
        placeholder="Project description (optional)"></textarea>
    </div>

    <div class="form-group">
      <label for="repo_url">Repository URL</label>
      <input type="url" id="repo_url" formControlName="repo_url" class="form-control"
        placeholder="https://github.com/user/repo" />
    </div>

    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="loading">
        Cancel
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="projectForm.invalid || loading">
        <span *ngIf="!loading">Create Project</span>
        <span *ngIf="loading">Creating...</span>
      </button>
    </div>
  </form>
</div>
